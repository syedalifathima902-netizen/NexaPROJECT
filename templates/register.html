<!DOCTYPE html>
<html>
<head>
    <title>Register | NexaATS Hire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #0a1f44; color: white; height: 100vh; display: flex; align-items: center;">
    <div class="container text-center">
        <div class="card p-5 mx-auto shadow" style="max-width: 450px; color: #333; border-radius: 20px;">
            <h2 class="fw-bold mb-4">Create Account</h2>
            <form action="/register" method="POST">
                <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
                <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
                <input type="text" name="phone" class="form-control mb-3" placeholder="91XXXXXXXXXX" required>
                <button type="submit" class="btn btn-danger w-100 fw-bold py-2">SEND OTP</button>
            </form>
            <p class="mt-3 small">Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
</body>
</html>
