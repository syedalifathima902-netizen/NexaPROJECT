<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fa; font-family: sans-serif; }
        .upload-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 100px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="upload-card mx-auto" style="max-width: 600px;">
            <h2 class="fw-bold mb-4">Upload Your Resume</h2>
            <p class="text-muted">AI-powered analysis for 8 key ATS factors</p>
            <form action="/analyze" method="POST" enctype="multipart/form-data">
                <input type="file" name="resume" class="form-control mb-4" required>
                <button type="submit" class="btn btn-primary btn-lg w-100">Analyze with AI 🚀</button>
            </form>
        </div>
    </div>
</body>
</html>
