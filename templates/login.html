<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexaHire ATS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0a1f44; --red: #ff4757; }
        body {
            background: var(--navy);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { color: var(--navy); font-weight: 800; margin-bottom: 30px; }
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #eee;
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: var(--red);
            box-shadow: none;
        }
        .btn-login {
            background: var(--red);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #e84118;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }
        .footer-text { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .footer-text a { color: var(--red); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>USER LOGIN</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-login">LOGIN TO ACCOUNT</button>
        </form>
        <div class="footer-text">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </div>

</body>
</html>
